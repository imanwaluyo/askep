<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NursAssess Pro</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div id="bg-shapes"><div class="bg-shape bg-shape-1"></div><div class="bg-shape bg-shape-2"></div><div class="bg-shape bg-shape-3"></div></div>
<div id="toast-box"></div>
<button id="mtog" onclick="toggleSB()"><i class="fas fa-bars"></i></button>
<div id="ovl" onclick="toggleSB()"></div>
<aside id="sidebar"><div class="sb-logo"><div class="sb-logo-icon"><i class="fas fa-heart-pulse"></i></div><div class="sb-logo-text"><span class="sb-logo-name">NursAssess</span><span class="sb-logo-ver">PRO v2.0</span></div></div><nav id="navl"></nav><div class="sb-footer"><span class="sb-footer-label">Developed by</span><span class="sb-footer-name">Iman Waluyo</span></div></aside>
<div id="main"><header class="topbar"><div id="stitle" class="topbar-title"></div><div class="topbar-track"><div class="topbar-fill" id="pfill"></div></div><span id="ptext" class="topbar-pct">0%</span><button class="btn btn-icon no-print" onclick="printRes()" title="Cetak"><i class="fas fa-print"></i></button><button class="btn btn-icon no-print" onclick="clearAllData()" title="Hapus Data" style="color:var(--danger)"><i class="fas fa-trash-can"></i></button></header><main class="content" id="carea"></main></div>
<div id="modal-clear" class="modal no-print" style="display:none"><div class="modal-box"><div class="modal-ic" style="background:var(--danger-light);color:var(--danger)"><i class="fas fa-triangle-exclamation"></i></div><h3>Hapus Semua Data?</h3><p>Semua data akan dihapus dan tidak bisa dikembalikan.</p><div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px"><button class="btn btn-s" onclick="document.getElementById('modal-clear').style.display='none'">Batal</button><button class="btn btn-danger" onclick="doClear()">Ya, Hapus</button></div></div></div>
<div id="modal-export" class="modal no-print" style="display:none"><div class="modal-box"><div class="modal-ic" style="background:var(--accent-light);color:var(--accent)"><i class="fas fa-file-export"></i></div><h3>Export Hasil Asesmen</h3><p>Pilih format file untuk mengekspor seluruh hasil asesmen.</p><div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px"><button class="btn btn-s" onclick="document.getElementById('modal-export').style.display='none'">Batal</button><button class="btn btn-p" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> PDF</button><button class="btn" style="background:var(--sky);color:#fff" onclick="exportDOC()"><i class="fas fa-file-word"></i> DOC</button></div></div></div>
<div id="export-box" style="position:absolute;left:-9999px;top:0;width:210mm"></div>
<div class="dev-tag no-print">by Iman Waluyo</div>
<script src="script.js"></script>
</body>
</html>
